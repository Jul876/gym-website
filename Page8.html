<!DOCTYPE html>
<html lang="ar" dir="rtl"> <!-- يحدد انه اللغة عربية والنص من اليمين لليسار -->
<head>
  <title>نموذج العضوية</title> 
  <link rel="stylesheet" href="style.css"> 
  <style>
    
    body {
      background-image: url("p3.jpg");
      background-size: cover;  /*الخلفية تغطي الشاشة كاملة */
      background-position: center; 
      background-attachment: fixed;  /* يخلي الخلفية ثابتة لما امرر */
      min-height: 100vh; /* الطول ما يقل عن ارتفاع الشاشة*/
      display: flex;
      justify-content: center; /* توسيط أفقي */
      align-items: center; /* توسيط عمودي */
      padding-top: 150px; /* مسافة من الأعلى */
    }

    
    .form-container {
      background-color: rgba(255, 255, 255, 0.95);
      padding: 30px; /* مساحة داخلية */
      border-radius: 12px; 
      width: 600px; 
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); 
    }

    
    h1 {
      text-align: center; 
      margin-bottom: 25px; /* مسافة تحته */
      color: #222; 
    }

    
    .row {
      display: flex; /* ترتيب العناصر أفقياً */
      gap: 20px; /* مسافة بين المستطيلات */
      margin-bottom: 15px; /* مسافة أسفل كل صف */
    }

    
    .field {
      flex: 1; /* كل حقل يأخذ نفس العرض */
      display: flex; 
      flex-direction: column; /* ترتيب عمودي: (label فوق، input تحت) */
    }


    label {
      margin-bottom: 6px; /* مسافة تحت التسمية */
      font-weight: bold; 
      color: #333;
    }

    
    input, .sselect {
      padding: 12px; /* مساحة داخلية للفيلد */
      border: 1px solid #ccc; 
      border-radius: 8px; 
      background: #f9f9f9; 
      font-size: 15px; 
    }

    
    .member-section {
      margin-top: 15px;
      padding: 15px;
      background: #f9f9f9;
      border: 1px dashed #ccc;
      border-radius: 6px;
    }

    
    button {
      width: 100%; 
      margin-top: 20px; /* مسافة فوق الزر */
      padding: 12px; /* مساحة داخلية للزر */
      background-color: #5f5855;
      color: white; 
      border: none; 
      border-radius: 6px;
    }

 
    button:hover {
      background-color: #382e2c;
    }
  </style>
</head>
<body id="page">

   <script>
    function changeFont(font) {
      document.getElementById("page").style.fontFamily = font;
    }
  </script>
  
  <!-- شريط التنقل العلوي -->

		  <option value="Verdana">Verdana</option>

</html>
